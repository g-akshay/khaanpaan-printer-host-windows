# Declares this directory as a one-package pnpm workspace so pnpm v10+ reads
# the settings below. Without `packages:`, v9 errors with "packages field
# missing or empty"; without the file entirely, v10+ ignores the build-script
# allowlist and CI fails with ERR_PNPM_IGNORED_BUILDS.
packages:
  - "."

# pnpm v11+ uses `allowBuilds` (not `onlyBuiltDependencies`) — explicit per-
# package true/false. serialport needs its native bindings built; esbuild
# needs its platform binary downloaded.
allowBuilds:
  "@serialport/bindings-cpp": true
  esbuild: true
